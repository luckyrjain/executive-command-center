services:
  postgres:
    image: postgres:18.0
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecc}
      POSTGRES_USER: ${POSTGRES_USER:-ecc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecc}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ecc_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecc} -d ${POSTGRES_DB:-ecc}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      ECC_ENV: ${ECC_ENV:-development}
      POSTGRES_DB: ${POSTGRES_DB:-ecc}
      POSTGRES_USER: ${POSTGRES_USER:-ecc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecc}
      ECC_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-ecc}:${POSTGRES_PASSWORD:-ecc}@postgres:5432/${POSTGRES_DB:-ecc}
      ECC_SESSION_SECRET: ${ECC_SESSION_SECRET:-development-only-secret-change-before-real-data}
      ECC_CORS_ORIGINS: ${ECC_CORS_ORIGINS:-http://localhost:5173}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')"]
      interval: 10s
      timeout: 5s
      retries: 10
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "127.0.0.1:5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

volumes:
  ecc_postgres:
