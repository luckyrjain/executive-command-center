name: pr5-review-fix

on:
  pull_request:

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'feature/phase-1-commitments'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feature/phase-1-commitments
      - run: python scripts/fix_pr5_review.py
      - run: |
          python -m pip install ruff==0.12.3
          ruff format backend tests
          ruff check --fix backend tests
      - name: Commit review fixes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add backend tests
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "fix(commitments): address PR review findings"
          git push origin HEAD:feature/phase-1-commitments
