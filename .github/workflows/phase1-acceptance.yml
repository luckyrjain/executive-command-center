name: phase1-acceptance

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  acceptance-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: 3.14.6
      - run: python scripts/check_phase1_acceptance.py

  backup-restore:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.0
        env:
          POSTGRES_DB: ecc
          POSTGRES_USER: ecc
          POSTGRES_PASSWORD: ecc
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ecc -d ecc"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      PGPASSWORD: ecc
      ECC_SESSION_SECRET: ci-secret-value-that-is-at-least-32-characters
      ECC_DATABASE_URL: postgresql+psycopg://ecc:ecc@localhost:5432/ecc
      RESTORE_DATABASE_URL: postgresql://ecc:ecc@localhost:5432/ecc_restore
      BACKUP_DIR: .local/backups
      SCHEMA_VERSION: phase1-ci
      PG_CLIENT_IMAGE: postgres:18.0
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: 3.14.6
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: 0.7.19
      - run: uv sync --frozen --all-groups --python 3.14.6
      - run: uv run alembic -c backend/alembic.ini upgrade head
      - run: createdb -h localhost -U ecc ecc_restore
      - name: Seed representative Phase 1 acceptance fixtures
        run: uv run python scripts/seed_phase1_acceptance.py
      - name: Backup and verify clean restore
        id: backup_restore
        run: |
          drill_start=$(date +%s)
          archive=$(./scripts/backup.sh)
          ./scripts/verify_restore.sh "${archive}"
          drill_end=$(date +%s)
          echo "archive=${archive}" >> "${GITHUB_OUTPUT}"
          echo "elapsed_seconds=$((drill_end - drill_start))" >> "${GITHUB_OUTPUT}"
      - name: Generate Phase 1 recovery evidence report
        run: |
          uv run python scripts/phase1_evidence.py \
            --source-url "postgresql://ecc:ecc@localhost:5432/ecc" \
            --target-url "postgresql://ecc:ecc@localhost:5432/ecc_restore" \
            --archive "${{ steps.backup_restore.outputs.archive }}" \
            --elapsed-seconds "${{ steps.backup_restore.outputs.elapsed_seconds }}" \
            --output-json .local/evidence/phase1-recovery.json \
            --output-md .local/evidence/phase1-recovery.md
      - name: Upload Phase 1 recovery evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: phase1-recovery-evidence
          path: .local/evidence/
          if-no-files-found: error
      - run: uv run pytest tests/test_phase1_acceptance.py
      - name: Validate recorded backup/restore result
        run: >
          uv run python scripts/check_phase1_acceptance.py
          --check-result backup_restore .local/evidence/phase1-recovery.json

  accessibility-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.17.0
      - run: corepack enable
      - run: corepack prepare pnpm@10.12.4 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @ecc/frontend exec playwright install --with-deps chromium
      - run: pnpm --filter @ecc/frontend test:e2e

  performance-acceptance:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.0
        env:
          POSTGRES_DB: ecc
          POSTGRES_USER: ecc
          POSTGRES_PASSWORD: ecc
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ecc -d ecc"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      ECC_SESSION_SECRET: ci-secret-value-that-is-at-least-32-characters
      ECC_DATABASE_URL: postgresql+psycopg://ecc:ecc@localhost:5432/ecc
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: 3.14.6
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: 0.7.19
      - run: uv sync --frozen --all-groups --python 3.14.6
      - run: uv run alembic -c backend/alembic.ini upgrade head
      - name: Run Phase 1 representative-scale performance gates
        id: performance_tests
        run: |
          mkdir -p .local/evidence
          set +e
          uv run pytest -v \
            tests/test_dashboard_performance_postgres.py \
            tests/test_mutation_brief_performance_postgres.py \
            tests/test_search_performance_postgres.py \
            tests/test_risks_attention_postgres.py \
            2>&1 | tee .local/evidence/phase1-performance.log
          exit_code="${PIPESTATUS[0]}"
          set -e
          echo "exit_code=${exit_code}" >> "${GITHUB_OUTPUT}"
          exit "${exit_code}"
      - name: Generate Phase 1 performance evidence report
        if: always()
        run: |
          status="failed"
          if [[ "${{ steps.performance_tests.outputs.exit_code }}" == "0" ]]; then
            status="passed"
          fi
          uv run python scripts/phase1_performance_evidence.py \
            --status "${status}" \
            --output-json .local/evidence/phase1-performance.json
      - name: Summarize Phase 1 performance evidence
        if: always()
        run: |
          {
            echo "## Phase 1 performance acceptance"
            echo
            echo "Representative-scale dataset: 10,000 tasks/commitments/risks/calendar events, 50,000 notes, 100,000 audit rows."
            echo
            echo '```'
            grep -E "PASSED|FAILED|took|p95|exceeds" .local/evidence/phase1-performance.log || true
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
      - name: Upload Phase 1 performance evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: phase1-performance-evidence
          path: .local/evidence/
          if-no-files-found: error
      - name: Validate recorded performance result
        if: always() && steps.performance_tests.outputs.exit_code == '0'
        run: >
          uv run python scripts/check_phase1_acceptance.py
          --check-result performance .local/evidence/phase1-performance.json
