name: pr6-review-fix

on:
  pull_request:

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'feature/phase-1-notes'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feature/phase-1-notes
      - run: |
          python - <<'PY'
          from pathlib import Path

          notes = Path('backend/ecc/domains/knowledge/notes.py')
          text = notes.read_text()
          text = text.replace(
              'from pydantic import BaseModel, ConfigDict, Field\n',
              'from pydantic import BaseModel, ConfigDict, Field, model_validator\n',
          )
          marker = '''    source_ref: str | None = Field(default=None, max_length=2000)\n\n\nclass NoteAction'''
          replacement = '''    source_ref: str | None = Field(default=None, max_length=2000)\n\n    @model_validator(mode="after")\n    def reject_null_required_fields(self) -> "NotePatch":\n        for field in ("body", "note_type", "source_type"):\n            if field in self.model_fields_set and getattr(self, field) is None:\n                raise ValueError(f"{field} cannot be null")\n        return self\n\n\nclass NoteAction'''
          if marker not in text:
              raise SystemExit('NotePatch marker not found')
          notes.write_text(text.replace(marker, replacement))

          tests = Path('tests/test_note_postgres.py')
          content = tests.read_text()
          content += '''\n\ndef test_note_patch_rejects_null_required_fields(\n    note_test_context: tuple[TestClient, UUID, UUID, str],\n) -> None:\n    client, _, _, token = note_test_context\n    created = client.post(\n        "/api/v1/notes",\n        headers=_headers(token, "null-fields-create"),\n        json={"title": "Required fields", "body": "Body"},\n    )\n    assert created.status_code == 201\n    note = created.json()\n\n    for field in ("body", "note_type", "source_type"):\n        response = client.patch(\n            f"/api/v1/notes/{note['id']}",\n            headers=_headers(token, f"null-{field}"),\n            json={"expected_version": note["version"], field: None},\n        )\n        assert response.status_code == 422\n        assert response.json()["error"]["code"] == "VALIDATION_ERROR"\n'''
          tests.write_text(content)
          PY
      - run: |
          python -m pip install ruff==0.12.3
          ruff format backend tests
          ruff check --fix backend tests
      - name: Commit review fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add backend tests
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "fix(notes): reject null required fields"
          git push origin HEAD:feature/phase-1-notes
