name: pr9-pytest-diagnostic
on:
  workflow_dispatch:
  push:
    branches: [feature/phase-1-search-audit]
permissions:
  contents: write
jobs:
  diagnose:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.0
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ecc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/ecc_test
      SESSION_SECRET: test-session-secret
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feature/phase-1-search-audit
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.14.6'
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e
      - run: uv sync --frozen --all-groups --python 3.14.6
      - run: uv run alembic -c backend/alembic.ini upgrade head
      - run: uv run pytest -q --tb=short > pr9-pytest.txt 2>&1 || true
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add pr9-pytest.txt
          git commit -m "chore: capture pr9 pytest failure" || exit 0
          git push
