name: pr6-fix-audit

on:
  pull_request:

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'feature/phase-1-notes'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feature/phase-1-notes
      - run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('backend/ecc/domains/knowledge/notes.py')
          text = path.read_text()
          text = text.replace(":metadata::jsonb", "CAST(:metadata AS jsonb)")
          path.write_text(text)
          PY
      - name: Commit fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add backend/ecc/domains/knowledge/notes.py
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "fix(notes): bind audit metadata as jsonb"
          git push origin HEAD:feature/phase-1-notes
