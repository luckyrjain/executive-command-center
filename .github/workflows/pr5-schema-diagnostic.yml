name: pr5-schema-diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Capture PKOS table definitions
        run: |
          { grep -R -n -A60 -B5 "pkos_nodes\|pkos_evidence" backend/migrations/versions || true; } > schema.txt
          find backend/migrations/versions -maxdepth 1 -type f -print >> schema.txt
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: pr5-schema
          path: schema.txt
