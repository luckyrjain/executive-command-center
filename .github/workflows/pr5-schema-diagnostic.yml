name: pr5-schema-diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Show PKOS table definitions
        run: |
          grep -R -n -A40 -B5 "create_table(.*pkos\|create_table(.*evidence\|create_table(.*person" backend/migrations/versions || true
          grep -R -n "pkos_nodes\|pkos_evidence" backend/migrations/versions || true
