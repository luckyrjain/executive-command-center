name: pr7-review-fixes

on:
  pull_request:

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'feature/phase-1-calendar-meetings'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feature/phase-1-calendar-meetings
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.14.6'
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e
      - run: uv sync --frozen --all-groups --python 3.14.6
      - run: |
          python - <<'PY'
          from pathlib import Path

          events = Path('backend/ecc/domains/calendar/events.py')
          text = events.read_text()
          marker = '\n\ndef _get_row(\n'
          helper = '''\n\ndef _request_ids(request: Request) -> tuple[UUID, UUID]:
              try:
                  return UUID(request.state.request_id), UUID(request.state.correlation_id)
              except (AttributeError, TypeError, ValueError):
                  return uuid4(), uuid4()


          def _write_audit_and_outbox(
              session: Session,
              auth: AuthContext,
              request: Request,
              event_type: str,
              event_id: UUID,
              version: int,
              changed_fields: list[str],
              now: datetime,
          ) -> None:
              request_id, correlation_id = _request_ids(request)
              session.execute(
                  text(
                      """
                      INSERT INTO audit_events (
                          id, workspace_id, event_type, aggregate_type, aggregate_id,
                          aggregate_version, actor_id, request_id, correlation_id,
                          changed_fields, authorization_result, source, metadata, occurred_at
                      ) VALUES (
                          :id, :workspace_id, :event_type, 'calendar_event', :aggregate_id,
                          :aggregate_version, :actor_id, :request_id, :correlation_id,
                          :changed_fields, 'allowed', 'user', '{}'::jsonb, :occurred_at
                      )
                      """
                  ),
                  {
                      "id": uuid4(),
                      "workspace_id": auth.workspace_id,
                      "event_type": event_type,
                      "aggregate_id": event_id,
                      "aggregate_version": version,
                      "actor_id": auth.user_id,
                      "request_id": request_id,
                      "correlation_id": correlation_id,
                      "changed_fields": changed_fields,
                      "occurred_at": now,
                  },
              )
              session.execute(
                  text(
                      """
                      INSERT INTO event_outbox (
                          event_id, workspace_id, event_type, event_version,
                          correlation_id, payload, occurred_at, attempt_count
                      ) VALUES (
                          :event_id, :workspace_id, :event_type, 1,
                          :correlation_id, CAST(:payload AS jsonb), :occurred_at, 0
                      )
                      """
                  ),
                  {
                      "event_id": uuid4(),
                      "workspace_id": auth.workspace_id,
                      "event_type": f"{event_type}.v1",
                      "correlation_id": correlation_id,
                      "payload": dumps({"calendar_event_id": str(event_id), "version": version}),
                      "occurred_at": now,
                  },
              )
          '''
          if '_write_audit_and_outbox(' not in text:
              text = text.replace(marker, helper + marker)
          text = text.replace(
              'response = CalendarEventResponse.model_validate(row)\n        _store_cached(session, auth, idempotency_key, request_hash, response, 201, now)',
              'response = CalendarEventResponse.model_validate(row)\n        _write_audit_and_outbox(\n            session, auth, request, "calendar_event.created", event_id, 1, ["*"], now\n        )\n        _store_cached(session, auth, idempotency_key, request_hash, response, 201, now)',
              1,
          )
          text = text.replace(
              'response = CalendarEventResponse.model_validate(row)\n        _store_cached(session, auth, idempotency_key, request_hash, response, 200, now)\n        return response\n\n\ndef _lifecycle(',
              'response = CalendarEventResponse.model_validate(row)\n        _write_audit_and_outbox(\n            session, auth, request, "calendar_event.updated", event_id, response.version, sorted(fields), now\n        )\n        _store_cached(session, auth, idempotency_key, request_hash, response, 200, now)\n        return response\n\n\ndef _lifecycle(',
          )
          text = text.replace(
              '    auth: AuthContext,\n    session: Session,\n    idempotency_key: str,',
              '    request: Request,\n    auth: AuthContext,\n    session: Session,\n    idempotency_key: str,',
              1,
          )
          text = text.replace(
              'response = CalendarEventResponse.model_validate(row)\n        _store_cached(session, auth, idempotency_key, request_hash, response, 200, now)\n        return response\n\n\n@router.post("/{event_id}/archive"',
              'response = CalendarEventResponse.model_validate(row)\n        event_type = f"calendar_event.{action}d"\n        _write_audit_and_outbox(\n            session, auth, request, event_type, event_id, response.version,\n            ["archived_at", "pre_archive_status"], now\n        )\n        _store_cached(session, auth, idempotency_key, request_hash, response, 200, now)\n        return response\n\n\n@router.post("/{event_id}/archive"',
          )
          text = text.replace(
              '    payload: CalendarEventAction,\n    auth: AuthDep,',
              '    payload: CalendarEventAction,\n    request: Request,\n    auth: AuthDep,',
          )
          text = text.replace(
              'return _lifecycle(event_id, payload, auth, session, idempotency_key, "archive")',
              'return _lifecycle(event_id, payload, request, auth, session, idempotency_key, "archive")',
          )
          text = text.replace(
              'return _lifecycle(event_id, payload, auth, session, idempotency_key, "restore")',
              'return _lifecycle(event_id, payload, request, auth, session, idempotency_key, "restore")',
          )
          events.write_text(text)

          meetings = Path('backend/ecc/domains/scheduling/meetings.py')
          text = meetings.read_text()
          text = text.replace(
              'from datetime import UTC, datetime, timedelta\n',
              'from base64 import urlsafe_b64decode, urlsafe_b64encode\nfrom datetime import UTC, datetime, timedelta\n',
          )
          text = text.replace('from hmac import ', 'from hmac import ') if 'from hmac import ' in text else text
          text = text.replace('from json import dumps\n', 'from hmac import compare_digest, new\nfrom json import dumps, loads\n')
          text = text.replace('from ecc.database import get_session\n', 'from ecc.config import get_settings\nfrom ecc.database import get_session\n')
          text = text.replace(
              'class MeetingListResponse(BaseModel):\n    items: list[MeetingResponse]\n',
              'class MeetingListResponse(BaseModel):\n    items: list[MeetingResponse]\n    next_cursor: str | None = None\n',
          )
          marker = '\n\ndef _validate_aware('
          cursor_helpers = '''\n\ndef _encode_cursor(updated_at: datetime, meeting_id: UUID) -> str:
              payload = dumps({"updated_at": updated_at.isoformat(), "id": str(meeting_id)}).encode()
              signature = new(get_settings().session_secret.encode(), payload, "sha256").hexdigest().encode()
              return urlsafe_b64encode(payload + b"." + signature).decode().rstrip("=")


          def _decode_cursor(cursor: str) -> tuple[datetime, UUID]:
              try:
                  raw = urlsafe_b64decode((cursor + "=" * (-len(cursor) % 4)).encode())
                  payload, signature = raw.rsplit(b".", 1)
                  expected = new(get_settings().session_secret.encode(), payload, "sha256").hexdigest()
                  if not compare_digest(signature.decode(), expected):
                      raise ValueError
                  decoded = loads(payload)
                  return datetime.fromisoformat(decoded["updated_at"]), UUID(decoded["id"])
              except (ValueError, KeyError, TypeError, UnicodeDecodeError) as exc:
                  raise HTTPException(status_code=400, detail="MALFORMED_CURSOR") from exc
          '''
          if '_encode_cursor(' not in text:
              text = text.replace(marker, cursor_helpers + marker)
          text = text.replace(
              '    include_archived: bool = False,\n    limit: int = Query(default=50, ge=1, le=100),',
              '    include_archived: bool = False,\n    cursor: str | None = None,\n    limit: int = Query(default=50, ge=1, le=100),',
          )
          text = text.replace(
              'params: dict[str, Any] = {"workspace_id": auth.workspace_id, "limit": limit}',
              'params: dict[str, Any] = {"workspace_id": auth.workspace_id, "limit": limit + 1}',
          )
          text = text.replace(
              '    if status_filter is not None:\n        clauses.append("status = :status")\n        params["status"] = status_filter\n',
              '    if status_filter is not None:\n        clauses.append("status = :status")\n        params["status"] = status_filter\n    if cursor:\n        updated_at, meeting_id = _decode_cursor(cursor)\n        clauses.append("(updated_at, id) < (:cursor_updated_at, :cursor_id)")\n        params.update({"cursor_updated_at": updated_at, "cursor_id": meeting_id})\n',
          )
          text = text.replace(
              '    return MeetingListResponse(items=[_project(session, auth, dict(row)) for row in rows])',
              '    page = rows[:limit]\n    next_cursor = None\n    if len(rows) > limit and page:\n        last = page[-1]\n        next_cursor = _encode_cursor(last["updated_at"], last["id"])\n    return MeetingListResponse(\n        items=[_project(session, auth, dict(row)) for row in page],\n        next_cursor=next_cursor,\n    )',
          )
          meetings.write_text(text)
          PY
          uv run ruff check --fix backend tests
          uv run ruff format backend tests
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm -f pr7-test-layout.txt || true
          git add backend tests
          git commit -m "fix: close calendar meetings review findings"
          git push origin HEAD:feature/phase-1-calendar-meetings