name: pr7-review-fixes

on:
  pull_request:

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'feature/phase-1-calendar-meetings'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feature/phase-1-calendar-meetings
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.14.6'
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e
      - run: uv sync --frozen --all-groups --python 3.14.6
      - run: |
          set +e
          python scripts/pr7_review_fix.py > pr7-fix-report.txt 2>&1
          uv run ruff check --fix backend tests scripts/pr7_review_fix.py >> pr7-fix-report.txt 2>&1
          uv run ruff format backend tests scripts/pr7_review_fix.py >> pr7-fix-report.txt 2>&1
          exit 0
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm -f pr7-test-layout.txt || true
          git add backend tests scripts/pr7_review_fix.py pr7-fix-report.txt
          git commit -m "chore: capture pr7 review patch result"
          git push origin HEAD:feature/phase-1-calendar-meetings