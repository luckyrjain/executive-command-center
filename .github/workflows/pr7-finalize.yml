name: pr7-finalize

on:
  pull_request:

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'feature/phase-1-calendar-meetings'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feature/phase-1-calendar-meetings
      - run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('backend/ecc/domains/scheduling/meetings.py')
          text = path.read_text().replace(
              '    next_cursor: str | None = None\n    next_cursor: str | None = None\n',
              '    next_cursor: str | None = None\n',
              1,
          )
          path.write_text(text)
          PY
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm -f pr7-mypy.txt .github/workflows/pr7-mypy-diagnostic.yml || true
          git add backend/ecc/domains/scheduling/meetings.py
          git commit -m "fix: remove duplicate meeting cursor field"
          git push origin HEAD:feature/phase-1-calendar-meetings
