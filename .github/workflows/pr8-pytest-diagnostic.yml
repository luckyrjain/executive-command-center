name: pr8-pytest-diagnostic

on:
  pull_request:

permissions:
  contents: write

jobs:
  diagnose:
    if: github.head_ref == 'feature/phase-1-risks-priority'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.0
        env:
          POSTGRES_USER: ecc
          POSTGRES_PASSWORD: ecc
          POSTGRES_DB: ecc
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ecc -d ecc"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      ECC_DATABASE_URL: postgresql+psycopg://ecc:ecc@localhost:5432/ecc
      ECC_SESSION_SECRET: test-session-secret-that-is-at-least-32-chars
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feature/phase-1-risks-priority
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.14.6'
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e
      - run: uv sync --frozen --all-groups --python 3.14.6
      - run: uv run alembic -c backend/alembic.ini upgrade head
      - run: uv run pytest -q --tb=short > pr8-pytest.txt 2>&1 || true
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add pr8-pytest.txt
          git commit -m "chore: capture PR8 pytest failure" || true
          git push origin HEAD:feature/phase-1-risks-priority
