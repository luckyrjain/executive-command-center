name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.0
        env:
          POSTGRES_DB: ecc
          POSTGRES_USER: ecc
          POSTGRES_PASSWORD: ecc
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ecc -d ecc"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      ECC_SESSION_SECRET: ci-secret-value-that-is-at-least-32-characters
      ECC_DATABASE_URL: postgresql+psycopg://ecc:ecc@localhost:5432/ecc
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: 3.14.6
      - uses: astral-sh/setup-uv@v6
        with:
          version: 0.7.19
          enable-cache: true
      - name: Verify Python runtime
        run: python --version
      - run: uv sync --all-groups --python 3.14.6
      - name: Ruff lint
        run: uv run ruff check backend tests
      - name: Ruff format
        run: uv run ruff format --check backend tests
      - name: Mypy
        shell: bash
        run: |
          set -o pipefail
          uv run mypy backend 2>&1 | tee backend-mypy-diagnostics.log
      - name: Upload backend mypy diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-mypy-diagnostics
          path: backend-mypy-diagnostics.log
      - run: uv run alembic -c backend/alembic.ini upgrade head
      - run: uv run pytest
      - run: uv run pip-audit

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.17.0
      - run: corepack enable
      - run: corepack prepare pnpm@10.12.4 --activate
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm --filter @ecc/frontend typecheck
      - run: pnpm --filter @ecc/frontend test -- --run
      - run: pnpm --filter @ecc/frontend build

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Scan repository for leaked secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: anchore/sbom-action@v0
        with: { path: ".", artifact-name: "ecc-sbom.spdx.json" }
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL
          exit-code: "1"
