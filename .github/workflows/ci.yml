name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: read

jobs:
  review-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
