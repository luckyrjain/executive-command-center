name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: read

jobs:
  patch-pr10:
    if: github.event_name == 'pull_request' && github.head_ref == 'feature/phase-1-dashboard-morning-brief'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feature/phase-1-dashboard-morning-brief
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: 3.14.6
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e
        with:
          version: 0.7.19
      - run: uv sync --frozen --all-groups --python 3.14.6
      - run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('backend/ecc/domains/platform/dashboard_briefs.py')
          text = path.read_text()
          text = text.replace(
              'from datetime import UTC, date, datetime, time, timedelta\n',
              'from datetime import UTC, date, datetime, time, timedelta\nfrom hashlib import sha256\n',
          )
          text = text.replace(
              'from fastapi import APIRouter, Depends, HTTPException, Query, Request\n',
              'from fastapi import APIRouter, Depends, Header, HTTPException, Query, Request\n',
          )
          text = text.replace(
              'DateQuery = Annotated[date | None, Query(alias="date")]\n',
              'DateQuery = Annotated[date | None, Query(alias="date")]\nIdempotencyHeader = Annotated[str, Header(alias="Idempotency-Key", min_length=1, max_length=255)]\n',
          )
          text = text.replace(
              'SELECT m.id, m.title, m.status, m.version,\n',
              'SELECT m.id, m.title, m.status, m.version,\n                       ce.id AS calendar_event_id, ce.version AS calendar_event_version,\n',
          )
          text = text.replace(
              'versions[f"meeting:{row[\'id\']}"] = int(row["version"])\n',
              'versions[f"meeting:{row[\'id\']}"] = int(row["version"])\n        if row["calendar_event_id"] is not None:\n            versions[f"calendar_event:{row[\'calendar_event_id\']}"] = int(row["calendar_event_version"])\n',
          )
          old_commitment = '''SELECT id, summary, status, direction, importance, due_date, due_at,
                       version, evidence_id
                FROM commitments
                WHERE workspace_id = :workspace_id
                  AND archived_at IS NULL
                  AND status IN ('detected', 'confirmed', 'active', 'broken')
                  AND ((due_at IS NOT NULL AND due_at < :end_at)
                    OR (due_date IS NOT NULL AND due_date <= :day))
                ORDER BY coalesce(due_at, due_date::timestamp) ASC, id ASC
                LIMIT 20'''
          new_commitment = '''SELECT c.id, c.summary, c.status, c.direction, c.importance,
                       c.due_date, c.due_at, c.version, c.evidence_id,
                       ai.score AS attention_score
                FROM commitments c
                LEFT JOIN attention_items ai
                  ON ai.workspace_id = c.workspace_id
                 AND ai.entity_type = 'commitment'
                 AND ai.entity_id = c.id
                WHERE c.workspace_id = :workspace_id
                  AND c.archived_at IS NULL
                  AND c.status IN ('detected', 'confirmed', 'active', 'broken')
                  AND ((c.due_at IS NOT NULL AND c.due_at < :start_at)
                    OR (c.due_date IS NOT NULL AND c.due_date < :day))
                ORDER BY ai.score DESC NULLS LAST,
                         coalesce(c.due_at, c.due_date::timestamp) ASC, c.id ASC
                LIMIT 20'''
          text = text.replace(old_commitment, new_commitment)
          text = text.replace(
              '{"workspace_id": workspace_id, "day": day, "end_at": end},\n',
              '{"workspace_id": workspace_id, "day": day, "start_at": start},\n',
          )
          text = text.replace(
              '"evidence_ids": [str(row["evidence_id"])] if row["evidence_id"] else [],\n',
              '"evidence_ids": [str(row["evidence_id"])] if row["evidence_id"] else [],\n            "score": int(row["attention_score"]) if row["attention_score"] is not None else None,\n',
          )
          text = text.replace(
              '''        if len(overdue) < 5:
            overdue.append(item)
        if row["direction"] == "made_to_me" and len(waiting) < 5:
            waiting.append(item)

    risk_rows = (''',
              '''        if len(overdue) < 5:
            overdue.append(item)

    waiting_rows = session.execute(
        text(
            """
            SELECT 'commitment' AS entity_type, id, summary AS title, status, version,
                   due_date, due_at, NULL::text AS blocked_reason
            FROM commitments
            WHERE workspace_id=:workspace_id AND archived_at IS NULL
              AND direction='made_to_me'
              AND status IN ('detected', 'confirmed', 'active', 'broken')
            UNION ALL
            SELECT 'task' AS entity_type, id, title, status, version,
                   due_date, due_at, blocked_reason
            FROM tasks
            WHERE workspace_id=:workspace_id AND archived_at IS NULL
              AND status='blocked' AND blocked_on_person_id IS NOT NULL
            ORDER BY entity_type ASC, id ASC
            LIMIT 20
            """
        ),
        {"workspace_id": workspace_id},
    ).mappings().all()
    for row in waiting_rows:
        key = (row["entity_type"], row["id"])
        if key in seen:
            continue
        seen.add(key)
        versions[f"{row['entity_type']}:{row['id']}"] = int(row["version"])
        waiting.append(
            {
                **_entity_ref(row["entity_type"], dict(row)),
                "title": row["title"],
                "status": row["status"],
                "due_date": row["due_date"],
                "due_at": row["due_at"],
                "blocked_reason": row["blocked_reason"],
            }
        )
        if len(waiting) == 5:
            break

    risk_rows = (''',
          )
          text = text.replace(
              '"meeting": "meetings",\n            "risk": "risks",\n',
              '"meeting": "meetings",\n            "calendar_event": "calendar_events",\n            "risk": "risks",\n',
          )
          text = text.replace(
              '    day: date,\n) -> MorningBriefResponse:\n',
              '    day: date,\n    commit: bool = True,\n) -> MorningBriefResponse:\n',
              1,
          )
          text = text.replace(
              '    session.commit()\n    return _response(dict(row), False, None)\n',
              '    response = _response(dict(row), False, None)\n    if commit:\n        session.commit()\n    return response\n',
          )
          old_refresh = '''def refresh_morning_brief(
    request: Request,
    auth: AuthDep,
    _: CsrfDep,
    session: SessionDep,
    day: DateQuery = None,
) -> MorningBriefResponse:
    target = _target_date(day, auth.timezone)
    return _generate(request, session, auth.workspace_id, auth.user_id, auth.timezone, target)
'''
          new_refresh = '''def refresh_morning_brief(
    request: Request,
    auth: AuthDep,
    _: CsrfDep,
    session: SessionDep,
    idempotency_key: IdempotencyHeader,
    day: DateQuery = None,
) -> MorningBriefResponse:
    target = _target_date(day, auth.timezone)
    request_hash = sha256(target.isoformat().encode()).hexdigest()
    now = datetime.now(UTC)
    session.execute(
        text("SELECT pg_advisory_xact_lock(hashtext(:key))"),
        {"key": f"brief-refresh:{auth.workspace_id}:{auth.user_id}:{idempotency_key}"},
    )
    existing = session.execute(
        text(
            """
            SELECT request_hash, response_body
            FROM idempotency_records
            WHERE workspace_id=:w AND actor_id=:u AND key=:key AND expires_at > :now
            """
        ),
        {"w": auth.workspace_id, "u": auth.user_id, "key": idempotency_key, "now": now},
    ).mappings().one_or_none()
    if existing is not None:
        if existing["request_hash"] != request_hash:
            session.rollback()
            raise HTTPException(status_code=409, detail="IDEMPOTENCY_CONFLICT")
        session.rollback()
        return MorningBriefResponse.model_validate(existing["response_body"])
    response = _generate(
        request, session, auth.workspace_id, auth.user_id, auth.timezone, target, commit=False
    )
    session.execute(
        text(
            """
            INSERT INTO idempotency_records (
                workspace_id, actor_id, key, request_hash, response_status,
                response_body, created_at, expires_at
            ) VALUES (
                :w, :u, :key, :request_hash, 200, CAST(:body AS jsonb), :now, :expires_at
            )
            """
        ),
        {
            "w": auth.workspace_id,
            "u": auth.user_id,
            "key": idempotency_key,
            "request_hash": request_hash,
            "body": response.model_dump_json(),
            "now": now,
            "expires_at": now + timedelta(hours=24),
        },
    )
    session.commit()
    return response
'''
          text = text.replace(old_refresh, new_refresh)
          path.write_text(text)

          test_path = Path('tests/test_dashboard_briefs_postgres.py')
          tests = test_path.read_text()
          tests = tests.replace(
              '"X-Correlation-ID": str(uuid4()),\n',
              '"X-Correlation-ID": str(uuid4()),\n        "Idempotency-Key": str(uuid4()),\n',
          )
          tests += '''


def test_dashboard_review_regressions(
    dashboard_context: tuple[TestClient, UUID, UUID, str],
) -> None:
    client, workspace_id, user_id, token = dashboard_context
    now = datetime.now(UTC)
    local_day = datetime.now().date()
    future_commitment = uuid4()
    blocked_task = uuid4()
    event_id = uuid4()
    meeting_id = uuid4()
    with engine.begin() as connection:
        connection.execute(text("""
            INSERT INTO commitments (
                id, workspace_id, owner_id, summary, direction, status, due_date,
                importance, confidence, pinned, created_by, updated_by,
                created_at, updated_at, version
            ) VALUES (
                :id, :w, :u, 'Future response', 'made_to_me', 'active', :due_date,
                'medium', 1.0, false, :u, :u, :now, :now, 1
            )
        """), {"id": future_commitment, "w": workspace_id, "u": user_id,
                 "due_date": local_day + timedelta(days=1), "now": now})
        connection.execute(text("""
            INSERT INTO tasks (
                id, workspace_id, owner_id, title, status, manual_priority,
                blocked_on_person_id, pinned, source_type, created_by, updated_by,
                created_at, updated_at, version
            ) VALUES (
                :id, :w, :u, 'Blocked approval', 'blocked', 'high', :person,
                false, 'local', :u, :u, :now, :now, 1
            )
        """), {"id": blocked_task, "w": workspace_id, "u": user_id,
                 "person": uuid4(), "now": now})
        connection.execute(text("""
            INSERT INTO calendar_events (
                id, workspace_id, external_source, title, starts_at, ends_at,
                all_day, timezone, status, source_authoritative,
                created_by, updated_by, created_at, updated_at, version
            ) VALUES (
                :id, :w, 'local', 'Review meeting', :starts, :ends, false,
                'Asia/Kolkata', 'confirmed', true, :u, :u, :now, :now, 1
            )
        """), {"id": event_id, "w": workspace_id, "u": user_id,
                 "starts": now, "ends": now + timedelta(hours=1), "now": now})
        connection.execute(text("""
            INSERT INTO meetings (
                id, workspace_id, calendar_event_id, title, status,
                created_by, updated_by, created_at, updated_at, version
            ) VALUES (
                :id, :w, :event_id, 'Review meeting', 'planned',
                :u, :u, :now, :now, 1
            )
        """), {"id": meeting_id, "w": workspace_id, "event_id": event_id,
                 "u": user_id, "now": now})

    dashboard = client.get('/api/v1/dashboard/today')
    assert dashboard.status_code == 200
    sections = dashboard.json()['sections']
    overdue_ids = {item['entity_id'] for item in sections.get('overdue_commitments', [])}
    waiting_ids = {item['entity_id'] for item in sections.get('waiting_on', [])}
    assert str(future_commitment) not in overdue_ids
    assert str(future_commitment) in waiting_ids
    assert str(blocked_task) in waiting_ids

    headers = _headers(token)
    first = client.post('/api/v1/briefs/morning', headers=headers)
    replay = client.post('/api/v1/briefs/morning', headers=headers)
    assert first.status_code == 200
    assert replay.status_code == 200
    assert replay.json()['id'] == first.json()['id']
    assert replay.json()['generation_version'] == first.json()['generation_version']

    with engine.begin() as connection:
        connection.execute(
            text('UPDATE calendar_events SET version=2, updated_at=:now WHERE id=:id AND workspace_id=:w'),
            {"now": datetime.now(UTC), "id": event_id, "w": workspace_id},
        )
    stale = client.get('/api/v1/briefs/morning')
    assert stale.status_code == 200
    assert stale.json()['stale'] is True
    assert stale.json()['stale_reason'] == 'source_version_changed'
'''
          test_path.write_text(tests)
          PY
      - run: uv run ruff format backend tests
      - run: uv run ruff check --fix backend tests
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add backend tests
          git commit -m "fix: harden dashboard and morning brief contracts" || exit 0
          git push

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.0
        env:
          POSTGRES_DB: ecc
          POSTGRES_USER: ecc
          POSTGRES_PASSWORD: ecc
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ecc -d ecc"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      ECC_SESSION_SECRET: ci-secret-value-that-is-at-least-32-characters
      ECC_DATABASE_URL: postgresql+psycopg://ecc:ecc@localhost:5432/ecc
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: 3.14.6
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e
        with:
          version: 0.7.19
          enable-cache: true
      - run: uv sync --frozen --all-groups --python 3.14.6
      - run: uv run ruff check backend tests
      - run: uv run ruff format --check backend tests
      - run: uv run mypy backend
      - run: uv run alembic -c backend/alembic.ini upgrade head
      - run: uv run pytest
      - run: uv run pip-audit

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22.17.0
      - run: corepack enable
      - run: corepack prepare pnpm@10.12.4 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @ecc/frontend typecheck
      - run: pnpm --filter @ecc/frontend test -- --run
      - run: pnpm --filter @ecc/frontend build

  containers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - run: docker build -f backend/Dockerfile -t ecc-backend:ci .
      - run: docker build -f frontend/Dockerfile -t ecc-frontend:ci .

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with: { fetch-depth: 0 }
      - name: Scan repository for leaked secrets
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with: { path: ".", artifact-name: "ecc-sbom.spdx.json" }
      - uses: aquasecurity/trivy-action@c07df6fec6fa692e6fd1200d50aaa1fdd66f03c8
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL
          exit-code: "1"
