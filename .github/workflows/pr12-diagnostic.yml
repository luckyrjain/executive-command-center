name: pr12-diagnostic

on:
  pull_request:

permissions:
  contents: write

jobs:
  diagnose:
    if: github.head_ref == 'feature/phase-1-executive-frontend'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feature/phase-1-executive-frontend
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22.17.0
      - run: corepack enable
      - run: corepack prepare pnpm@10.12.4 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @ecc/frontend typecheck > pr12-typecheck.txt 2>&1 || true
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add pr12-typecheck.txt
          git commit -m "chore: capture PR12 typecheck report" || exit 0
          git push
