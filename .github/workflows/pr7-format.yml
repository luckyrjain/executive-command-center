name: pr7-format

on:
  pull_request:

permissions:
  contents: write

jobs:
  format:
    if: github.head_ref == 'feature/phase-1-calendar-meetings'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feature/phase-1-calendar-meetings
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.14.6'
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e
      - run: uv sync --frozen --all-groups --python 3.14.6
      - run: |
          python - <<'PY'
          from pathlib import Path

          events = Path('backend/ecc/domains/calendar/events.py')
          text = events.read_text()
          text = text.replace('-> "CalendarEventCreate":', '-> CalendarEventCreate:')
          text = text.replace('-> "CalendarEventPatch":', '-> CalendarEventPatch:')
          text = text.replace(
              'assignments.extend(["updated_by = :updated_by", "updated_at = :now", "version = version + 1"])',
              'assignments.extend(\n            ["updated_by = :updated_by", "updated_at = :now", "version = version + 1"]\n        )',
          )
          events.write_text(text)

          meetings = Path('backend/ecc/domains/scheduling/meetings.py')
          text = meetings.read_text()
          text = text.replace('-> "MeetingCreate":', '-> MeetingCreate:')
          text = text.replace('-> "MeetingPatch":', '-> MeetingPatch:')
          text = text.replace(
              'SessionDep = Annotated[Session, Depends(get_session)]\n',
              'SessionDep = Annotated[Session, Depends(get_session)]\n'
              'MeetingStatusFilter = Annotated[MeetingStatus | None, Query(alias="status")]\n',
          )
          text = text.replace(
              'status_filter: MeetingStatus | None = Query(default=None, alias="status"),',
              'status_filter: MeetingStatusFilter = None,',
          )
          meetings.write_text(text)
          PY
          uv run ruff check --fix backend tests
          uv run ruff format backend tests
      - name: Commit fixes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm -f pr7-ruff.txt || true
          git add backend tests
          git commit -m "fix: satisfy calendar meetings lint"
          git push origin HEAD:feature/phase-1-calendar-meetings
