name: pr6-pytest-diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  pytest:
    if: github.head_ref == 'feature/phase-1-notes'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.0
        env:
          POSTGRES_USER: ecc
          POSTGRES_PASSWORD: ecc
          POSTGRES_DB: ecc
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ecc -d ecc"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      ECC_SESSION_SECRET: ci-secret-value-that-is-at-least-32-characters
      ECC_DATABASE_URL: postgresql+psycopg://ecc:ecc@localhost:5432/ecc
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.14.6'
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e
      - run: uv sync --frozen --all-groups --python 3.14.6
      - name: Capture migration report
        run: uv run alembic -c backend/alembic.ini upgrade head > migration-report.txt 2>&1 || true
      - name: Capture pytest report
        run: uv run pytest -q > pytest-report.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: pr6-diagnostic-report
          path: |
            migration-report.txt
            pytest-report.txt
